const AudioMgr = {
  ctx: null,
  muted: false,
  volume: 0.3,

  // BGM scheduler properties
  bgmInterval: null,
  bgmIndex: 0,
  bgmSequence: [
    // Cheerfully simple C-major arpeggios for pleasant retro game flow
    261.63, 329.63, 392.00, 523.25, 392.00, 329.63,
    293.66, 349.23, 440.00, 587.33, 440.00, 349.23,
    329.63, 392.00, 493.88, 659.25, 493.88, 392.00,
    349.23, 440.00, 523.25, 698.46, 523.25, 440.00
  ],

  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { /* no audio */ }
  },

  play(type) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    switch(type) {
      case 'pass': this._beep(440, 0.08, 'square', 660); break;
      case 'fail': this._beep(220, 0.25, 'sawtooth', 110); break;
      case 'goal': this._fanfare(); break;
      case 'star': this._beep(880, 0.1, 'square', 1100); break;
      case 'click': this._beep(600, 0.04, 'square', 600); break;
      case 'undo': this._beep(330, 0.06, 'triangle', 220); break;
      case 'lock': this._beep(150, 0.15, 'sawtooth', 100); break;
    }
  },

  _beep(freq, dur, wave, endFreq) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(endFreq || freq, this.ctx.currentTime + dur);
    gain.gain.setValueAtTime(this.volume * 0.5, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + dur);
  },

  _fanfare() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => this._beep(f, 0.15, 'square', f), i * 120);
    });
  },

  startBGM() {
    this.init();
    if (!this.ctx || this.muted || this.bgmInterval) return;
    this.bgmIndex = 0;
    this.bgmInterval = setInterval(() => {
      if (this.muted || !this.ctx || this.ctx.state === 'suspended') return;
      const note = this.bgmSequence[this.bgmIndex];
      this._playBgmNote(note, 0.12);
      this.bgmIndex = (this.bgmIndex + 1) % this.bgmSequence.length;
    }, 180);
  },

  stopBGM() {
    if (this.bgmInterval) {
      clearInterval(this.bgmInterval);
      this.bgmInterval = null;
    }
  },

  _playBgmNote(freq, dur) {
    if (!this.ctx || this.muted) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
      gain.gain.setValueAtTime(this.volume * 0.12, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start();
      osc.stop(this.ctx.currentTime + dur);
    } catch (e) {}
  }
};

// ─── Storage Manager ─────────────────────────────
const SAVE_KEY = 'buildup-lab:v1';
const StorageMgr = {
  data: null,

  load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        this.data = JSON.parse(raw);
      }
    } catch(e) { /* corrupt */ }
    if (!this.data || typeof this.data !== 'object') {
      this.data = this._defaults();
    }
    // merge defaults for missing keys
    const def = this._defaults();
    for (const k in def) {
      if (!(k in this.data)) this.data[k] = def[k];
    }
  },

  save() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(this.data));
    } catch(e) { /* full */ }
  },

  _defaults() {
    return {
      levels: {},   // { "1": { stars: 0, bestPasses: 99 }, ... }
      unlocked: 1,
      muted: false,
      volume: 0.3,
    };
  },

  getLevelData(id) {
    return this.data.levels[id] || { stars: 0, bestPasses: 99 };
  },

  setLevelData(id, stars, passes) {
    const cur = this.getLevelData(id);
    if (stars > cur.stars || (stars === cur.stars && passes < cur.bestPasses)) {
      this.data.levels[id] = { stars: Math.max(cur.stars, stars), bestPasses: Math.min(cur.bestPasses, passes) };
    }
    if (id >= this.data.unlocked) {
      this.data.unlocked = Number(id) + 1;
    }
    this.save();

// ─── Utility Functions ───────────────────────────
function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

// Line segment (p1→p2) intersection with circle (c, r)
function lineCircleIntersect(p1, p2, c, r) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const fx = p1.x - c.x;
  const fy = p1.y - c.y;
  const a = dx * dx + dy * dy;
  const b = 2 * (fx * dx + fy * dy);
  const cc = fx * fx + fy * fy - r * r;
  let disc = b * b - 4 * a * cc;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2 * a);
  const t2 = (-b + disc) / (2 * a);
  if (t1 >= 0 && t1 <= 1) return true;
  if (t2 >= 0 && t2 <= 1) return true;
  if (t1 < 0 && t2 > 1) return true;
  return false;
}

// Point in rect
function pointInRect(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

// Check if point p is in the cover shadow of defender d from holder h
function pointInCoverShadow(p, d, h) {
  // vector from holder to defender
  const vHD = { x: d.x - h.x, y: d.y - h.y };
  const distHD = Math.sqrt(vHD.x * vHD.x + vHD.y * vHD.y);
  if (distHD === 0) return false;
  const dirHD = { x: vHD.x / distHD, y: vHD.y / distHD };

  // vector from defender to point p
  const vDP = { x: p.x - d.x, y: p.y - d.y };
  const distDP = Math.sqrt(vDP.x * vDP.x + vDP.y * vDP.y);
  if (distDP === 0) return false;
  if (distDP > d.coverShadowLength) return false;
  const dirDP = { x: vDP.x / distDP, y: vDP.y / distDP };

  // cosine of angle between dirHD and dirDP
  const dot = dirHD.x * dirDP.x + dirHD.y * dirDP.y;
  if (dot <= 0) return false; // must be behind defender

  const angle = Math.acos(dot) * 180 / Math.PI;
  return angle <= (d.coverShadowAngle / 2);
}

// Sampling based line-cone intersection check
function lineIntersectsCoverShadow(p1, p2, d, h) {
  const samples = 16;
  for (let i = 1; i <= samples; i++) {
    const t = i / samples;
    const p = {
      x: p1.x + (p2.x - p1.x) * t,
      y: p1.y + (p2.y - p1.y) * t
    };
    if (pointInCoverShadow(p, d, h)) {
      return true;
    }
  }
  return false;
}

// ─── Collective pressing block movement (shared by runtime + solver) ───
// One pure step for a single defender so runtime and BFS solver stay identical.
// Triggers: back-pass step-up, touchline trap; statics slide ball-side (compactness).
const COHESION_Y = 4;          // static ball-side vertical slide per turn
const PRESS_BACKPASS_BONUS = 4; // pressers/chasers step up further when ball goes back
const PRESS_TRAP_BONUS = 4;     // pressers tighten when holder is pinned on a wing
function stepDefender(d, holder, prevHolderX) {
  const nd = { ...d, patrolPath: d.patrolPath ? d.patrolPath.map(p => ({ ...p })) : null };
  if (!holder) return nd;
  const backPass = (prevHolderX != null) && (holder.x < prevHolderX - 2);
  const ch = channelOf(holder.y);
  const onWing = (ch === 0 || ch === 4);

  if (d.type === 'patrol' && d.patrolPath) {
    nd.patrolIdx = d.patrolIdx || 0;
    nd.patrolDir = d.patrolDir || 1;
    const target = d.patrolPath[nd.patrolIdx];
    const dx = target.x - d.x, dy = target.y - d.y;
    const dd = Math.sqrt(dx * dx + dy * dy);
    const moveAmt = 15;
    if (dd <= moveAmt) {
      nd.x = target.x; nd.y = target.y;
      nd.patrolIdx += nd.patrolDir;
      if (nd.patrolIdx >= d.patrolPath.length || nd.patrolIdx < 0) {
        nd.patrolDir *= -1;
        nd.patrolIdx += nd.patrolDir * 2;
        nd.patrolIdx = Math.max(0, Math.min(nd.patrolIdx, d.patrolPath.length - 1));
      }
    } else {
      nd.x += (dx / dd) * moveAmt;
      nd.y += (dy / dd) * moveAmt;
    }
  } else if (d.type === 'chase') {
    if (dist(d, holder) < (d.alertRange || 80)) {
      const dx = holder.x - d.x, dy = holder.y - d.y;
      const dd = Math.sqrt(dx * dx + dy * dy);
      const moveAmt = 12 + (backPass ? PRESS_BACKPASS_BONUS : 0);
      if (dd > 0) {
        nd.x += (dx / dd) * Math.min(moveAmt, dd);
        nd.y += (dy / dd) * Math.min(moveAmt, dd);
      }
    }
  } else if (d.type === 'presser') {
    if (dist(d, holder) < 100) {
      const dx = holder.x - d.x, dy = holder.y - d.y;
      const dd = Math.sqrt(dx * dx + dy * dy);
      const moveAmt = 8 + (backPass ? PRESS_BACKPASS_BONUS : 0) + (onWing ? PRESS_TRAP_BONUS : 0);
      if (dd > 20) {
        nd.x += (dx / dd) * moveAmt;
        nd.y += (dy / dd) * moveAmt;
      }
    }
  } else {
    // static: block cohesion — slide ball-side in y only (x stays as a line anchor)
    const dy = holder.y - d.y;
    if (Math.abs(dy) > COHESION_Y) nd.y += Math.sign(dy) * COHESION_Y;
    else nd.y = holder.y;
  }
  return nd;
}

// ─── Vector Sprite Helpers (High Resolution & Sub-pixel Precise) ────────────────────
function drawPixelCircle(ctx, x, y, r, fill, stroke, strokeW) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 1; ctx.stroke(); }
}

function drawPlayer(ctx, x, y, hasBall, highlighted, passRange) {
  if (highlighted && passRange) {
    drawPixelCircle(ctx, x, y, passRange, C.passRange, C.passRangeStroke, 1);
  }

  const bodyColor = highlighted ? C.playerHighlight : C.playerBlue;
  drawPixelCircle(ctx, x, y, PLAYER_RADIUS, bodyColor, C.playerOutline, 1.5);

  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 2, y - 2, 4, 4);

  if (hasBall) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.15 * Math.sin(Date.now() / 200);
    drawPixelCircle(ctx, x, y, PLAYER_RADIUS + 4, null, C.uiAccent, 2);
    ctx.restore();
  }
}

function getLevelTacticalLabel(id) {
  if (id <= 5) return `DRILL 0${id}`;
  if (id <= 10) return `PATTERN 0${id - 5}`;
  if (id <= 15) return `SCENARIO 0${id - 10}`;
  return `CHALLENGE 0${id - 15}`;
}

function drawDefender(ctx, d, time) {
  const px = d.x;
  const py = d.y;

  // Presser cover shadow cone drawing
  if (d.type === 'presser' && d.coverShadowAngle && d.coverShadowLength) {
    const holder = Game.players[Game.currentPlayerIdx];
    if (holder) {
      const dx = d.x - holder.x;
      const dy = d.y - holder.y;
      const baseAngle = Math.atan2(dy, dx);
      const halfAngle = (d.coverShadowAngle * Math.PI / 180) / 2;

      ctx.save();
      ctx.fillStyle = C.coverShadow;
      ctx.strokeStyle = C.coverShadowStroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.arc(d.x, d.y, d.coverShadowLength, baseAngle - halfAngle, baseAngle + halfAngle);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  // Block range circle
  let rangeColor, strokeColor;
  if (d.type === 'patrol') {
    rangeColor = C.patrolRange;
    strokeColor = C.patrolStroke;
  } else if (d.type === 'chase') {
    rangeColor = C.chaseRange;
    strokeColor = C.chaseStroke;
  } else {
    rangeColor = C.defenderRange;
    strokeColor = C.defenderRangeStroke;
  }
  drawPixelCircle(ctx, px, py, d.blockRadius, rangeColor, strokeColor, 1);

  // Patrol path visualization
  if (d.type === 'patrol' && d.patrolPath) {
    ctx.save();
    ctx.setLineDash([2, 4]);
    ctx.strokeStyle = C.patrolStroke;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(d.patrolPath[0].x, d.patrolPath[0].y);
    for (let i = 1; i < d.patrolPath.length; i++) {
      ctx.lineTo(d.patrolPath[i].x, d.patrolPath[i].y);
    }
    ctx.stroke();
    ctx.restore();
    ctx.setLineDash([]);
  }

  // Body
  const bodyColor = d.type === 'chase' ? '#a050d0' : (d.type === 'patrol' ? '#d9a04a' : C.defenderRed);
  const outColor = d.type === 'chase' ? '#6a2a9a' : (d.type === 'patrol' ? '#9a6a2a' : C.defenderOutline);
  drawPixelCircle(ctx, px, py, PLAYER_RADIUS - 1, bodyColor, outColor, 1.5);

  // Shape icon
  ctx.fillStyle = '#fff';
  if (d.type === 'static' || d.type === 'presser') {
    ctx.fillRect(px - 2, py - 2, 4, 4);
  } else if (d.type === 'patrol') {
    ctx.fillRect(px - 3, py - 1, 6, 2);
    ctx.fillRect(px - 3, py - 2, 1, 4);
    ctx.fillRect(px + 2, py - 2, 1, 4);
  } else if (d.type === 'chase') {
    ctx.beginPath();
    ctx.moveTo(px, py - 3);
    ctx.lineTo(px + 3, py + 2);
    ctx.lineTo(px - 3, py + 2);
    ctx.closePath();
    ctx.fill();
  }
}

function drawBall(ctx, x, y) {
  drawPixelCircle(ctx, x, y, BALL_RADIUS, C.ball, C.ballOutline, 1);
}

function drawTargetZone(ctx, tz) {
  if (!tz) return;
  ctx.save();
  ctx.fillStyle = C.targetZone;
  ctx.strokeStyle = C.targetZoneStroke;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.fillRect(tz.x, tz.y, tz.w, tz.h);
  ctx.strokeRect(tz.x, tz.y, tz.w, tz.h);
  ctx.setLineDash([]);

  // Label Text + the positional-play channel it sits in
  const cx = tz.x + tz.w / 2;
  const cy = tz.y + tz.h / 2;
  ctx.fillStyle = C.targetZoneText;
  ctx.font = 'bold 7px Outfit';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(tz.label.toUpperCase(), cx, cy - 4);
  ctx.fillStyle = 'rgba(0,180,216,0.7)';
  ctx.font = '600 5px Outfit';
  ctx.fillText(CHANNELS[channelOf(cy)].label, cx, cy + 5);
  ctx.restore();
}

function drawField(ctx, w, h) {
  // Base
  ctx.fillStyle = C.fieldGreen;
  ctx.fillRect(0, 0, w, h);

  // Stripes
  const stripeW = 32;
  ctx.fillStyle = C.fieldDark;
  for (let i = 0; i < w; i += stripeW * 2) {
    ctx.fillRect(i, 0, stripeW, h);
  }

  // Border
  ctx.strokeStyle = C.fieldLine;
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, w - 20, h - 20);

  // Center line
  ctx.beginPath();
  ctx.moveTo(w / 2, 10);
  ctx.lineTo(w / 2, h - 10);
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(w / 2, h / 2, 30, 0, Math.PI * 2);
  ctx.stroke();

  // Penalty areas
  ctx.strokeRect(10, h/2 - 40, 50, 80);
  ctx.strokeRect(w - 60, h/2 - 40, 50, 80);
}

// Positional-play channel overlay: subtle half-space shading + separators + labels
function drawChannels(ctx) {
  ctx.save();
  // Highlight the two half-spaces (highest-value build-up channels)
  ctx.fillStyle = 'rgba(0,245,212,0.035)';
  ctx.fillRect(FIELD_X0, CHANNELS[1].y0, FIELD_X1 - FIELD_X0, CHANNELS[1].y1 - CHANNELS[1].y0);
  ctx.fillRect(FIELD_X0, CHANNELS[3].y0, FIELD_X1 - FIELD_X0, CHANNELS[3].y1 - CHANNELS[3].y0);

  // Channel separators
  ctx.strokeStyle = 'rgba(120,160,140,0.10)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 4]);
  for (let i = 1; i < CHANNELS.length; i++) {
    ctx.beginPath();
    ctx.moveTo(FIELD_X0, CHANNELS[i].y0);
    ctx.lineTo(FIELD_X1, CHANNELS[i].y0);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Channel short labels down the left edge
  ctx.fillStyle = 'rgba(150,180,165,0.30)';
  ctx.font = '600 5px "Outfit"';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  for (const ch of CHANNELS) {
    ctx.fillText(ch.short, FIELD_X0 + 2, (ch.y0 + ch.y1) / 2);
  }
  ctx.restore();
}

// Lines of engagement: cluster defenders by x and draw faint vertical pressing lines
function drawLinesOfEngagement(ctx, defenders) {
  if (!defenders.length) return;
  const xs = defenders.map(d => d.x).sort((a, b) => a - b);
  const lines = [];
  for (const x of xs) {
    if (lines.length && Math.abs(x - lines[lines.length - 1]) < 22) {
      lines[lines.length - 1] = (lines[lines.length - 1] + x) / 2;
    } else {
      lines.push(x);
    }
  }
  ctx.save();
  ctx.strokeStyle = 'rgba(255,92,92,0.12)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([1, 5]);
  for (const x of lines) {
    ctx.beginPath();
    ctx.moveTo(x, FIELD_Y0);
    ctx.lineTo(x, FIELD_Y1);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawStar(ctx, cx, cy, r, filled) {
  const spikes = 5;
  const outerR = r;
  const innerR = r * 0.45;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const radius = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI / spikes) * i - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = filled ? C.starGold : C.starEmpty;
  ctx.fill();
  if (filled) {
    ctx.strokeStyle = '#b8960a';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}
